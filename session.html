<!DOCTYPE html>
<html lang="en" class="doc-clear">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="overlay-body">
    <div class="sess-overlay">
      <div class="overlay-drag" data-tauri-drag-region>
        <span class="title">Session</span>
        <span class="dot" id="sessDot">&#9679;</span>
        <button id="closeSess" title="Close">&times;</button>
      </div>
      <div class="sess-body">
        <div id="oIdle">
          <input class="sess-buyin" id="oBuyIn" type="number" min="0" step="0.01" placeholder="Buy-in $" inputmode="decimal" />
          <button id="oStart" class="primary sess-wide" type="button">Start session</button>
        </div>
        <div id="oLive" hidden>
          <div class="counter big">
            <button class="cbtn" id="oMinus" type="button">&minus;</button>
            <div class="counter-mid">
              <input class="counter-amt" id="oAmt" type="number" min="0" step="0.01" />
              <div class="counter-wl even" id="oWL">Even</div>
            </div>
            <button class="cbtn" id="oPlus" type="button">+</button>
          </div>
          <div class="counter-foot">
            <label class="step-lbl">Step <input type="number" id="oStep" value="5" min="1" step="1" /></label>
            <button id="oStop" type="button">Lock in</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/session-overlay.js"></script>
  </body>
</html>
